<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Say It For Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.19.0/fonts/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #e8563a; --accent-light: #fdf1ee;
      --bg: #f7f6f3; --surface: #ffffff; --surface2: #f2f1ee;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
      --text: #1a1a1a; --muted: #666; --hint: #999;
      --radius: 14px; --radius-sm: 10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110; --surface: #1c1c1a; --surface2: #252523;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
        --text: #f0efe9; --muted: #999; --hint: #666; --accent-light: #2a1a15;
      }
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
    .app { max-width: 640px; margin: 0 auto; }
    .header { margin-bottom: 2.5rem; }
    .header h1 { font-family: 'Instrument Serif', serif; font-size: clamp(32px, 6vw, 44px); font-weight: 400; line-height: 1.1; margin-bottom: 0.4rem; }
    .header h1 em { font-style: italic; color: var(--accent); }
    .header p { font-size: 14px; color: var(--muted); font-weight: 300; }
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
    .card-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--hint); margin-bottom: 0.75rem; }
    .situations { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .sit-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--muted); cursor: pointer; text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
    .sit-btn i { font-size: 15px; }
    .sit-btn:hover { border-color: var(--border2); color: var(--text); }
    .sit-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }
    textarea, input[type="password"], select { width: 100%; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.15s; appearance: none; }
    textarea { resize: none; line-height: 1.6; }
    textarea:focus, input:focus, select:focus { border-color: var(--border2); }
    .tones { display: flex; gap: 8px; flex-wrap: wrap; }
    .tone-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 100px; padding: 6px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .tone-btn:hover { border-color: var(--border2); color: var(--text); }
    .tone-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }
    .api-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .api-header .card-label { margin-bottom: 0; }
    .key-toggle { font-size: 12px; color: var(--accent); cursor: pointer; background: none; border: none; font-family: 'DM Sans', sans-serif; text-decoration: underline; padding: 0; }
    .api-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .field-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .hint { color: var(--hint); }
    .api-section { display: none; margin-top: 4px; }
    .api-section.visible { display: block; }
    .generate-btn { width: 100%; background: var(--accent); border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: #fff; cursor: pointer; transition: opacity 0.15s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .generate-btn:hover { opacity: 0.88; }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { font-size: 13px; color: #e24b4a; margin-top: 8px; display: none; }
    .error-msg.visible { display: block; }
    .output-area { display: none; margin-top: 1rem; }
    .output-area.visible { display: block; }
    .divider { height: 0.5px; background: var(--border); margin: 1rem 0; }
    .output-box { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 1.25rem; font-size: 14px; line-height: 1.75; color: var(--text); white-space: pre-wrap; min-height: 80px; }
    .output-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .action-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 7px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .action-btn:hover { border-color: var(--border2); color: var(--text); }
    .copied-badge { font-size: 12px; color: #3B6D11; background: #EAF3DE; padding: 4px 10px; border-radius: 100px; display: none; }
    .copied-badge.visible { display: inline; }
    .loading-dots span { animation: blink 1.2s infinite; opacity: 0; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    @media (max-width: 480px) { .api-row { grid-template-columns: 1fr; } .situations { grid-template-columns: 1fr 1fr; } }

    /* Dark mode toggle */
    .theme-toggle { position: fixed; top: 1.25rem; right: 1.25rem; background: var(--accent); border: none; border-radius: 100px; padding: 8px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; z-index: 9999; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .theme-toggle:hover { opacity: 0.88; }

    /* Manual dark mode override */
    body.dark {
      --bg: #111110; --surface: #1c1c1a; --surface2: #252523;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --text: #f0efe9; --muted: #999; --hint: #666; --accent-light: #2a1a15;
    }
    body.light {
      --bg: #f7f6f3; --surface: #ffffff; --surface2: #f2f1ee;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
      --text: #1a1a1a; --muted: #666; --hint: #999; --accent-light: #fdf1ee;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle"><i class="ti ti-moon"></i> Dark</button>

  <div class="app">
    <header class="header">
      <h1>Say it <em>for me.</em></h1>
      <p>You know what you mean. We help you say it.</p>
    </header>

    <div class="card">
      <div class="card-label">What's the situation?</div>
      <div class="situations">
        <button class="sit-btn active" data-val="saying no to someone"><i class="ti ti-hand-stop"></i> Saying no</button>
        <button class="sit-btn" data-val="ending a relationship or friendship"><i class="ti ti-heart-broken"></i> Breaking up</button>
        <button class="sit-btn" data-val="confronting someone about a problem"><i class="ti ti-message-exclamation"></i> Confronting</button>
        <button class="sit-btn" data-val="apologizing sincerely"><i class="ti ti-rosette"></i> Apologizing</button>
        <button class="sit-btn" data-val="asking for a raise or better deal"><i class="ti ti-trending-up"></i> Negotiating</button>
        <button class="sit-btn" data-val="setting a boundary with someone"><i class="ti ti-shield"></i> Setting limits</button>
        <button class="sit-btn" data-val="delivering bad news"><i class="ti ti-alert-triangle"></i> Bad news</button>
        <button class="sit-btn" data-val="other difficult message"><i class="ti ti-dots"></i> Other</button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Tell us a bit more</div>
      <textarea id="details" placeholder="Who is this to? What happened? What do you want them to understand?" rows="4"></textarea>
    </div>

    <div class="card">
      <div class="card-label">Tone</div>
      <div class="tones">
        <button class="tone-btn active" data-val="warm and gentle">Warm & gentle</button>
        <button class="tone-btn" data-val="honest and direct">Honest & direct</button>
        <button class="tone-btn" data-val="firm and clear">Firm & clear</button>
        <button class="tone-btn" data-val="professional and formal">Professional</button>
        <button class="tone-btn" data-val="casual and friendly">Casual</button>
      </div>
    </div>

    <div class="card">
      <div class="api-header">
        <div class="card-label">AI Provider</div>
        <button class="key-toggle" id="keyToggle">Add your API key</button>
      </div>
      <div class="api-row">
        <div>
          <div class="field-label">Provider</div>
          <select id="provider">
            <option value="anthropic">Anthropic (Claude)</option>
            <option value="openai">OpenAI (GPT-4o)</option>
            <option value="google">Google (Gemini)</option>
            <option value="mistral">Mistral</option>
            <option value="cohere">Cohere</option>
            <option value="xai">xAI (Grok)</option>
          </select>
        </div>
        <div>
          <div class="field-label">Format</div>
          <select id="format">
            <option value="text message">Text message</option>
            <option value="short email">Short email</option>
            <option value="voice note script">Voice note</option>
            <option value="in-person script">In-person script</option>
          </select>
        </div>
      </div>
      <div class="api-section" id="apiSection">
        <div class="field-label">Your API Key <span class="hint">(saved in your browser)</span></div>
        <input type="password" id="apiKey" placeholder="Paste your key here..." autocomplete="off" />
      </div>
    </div>

    <button class="generate-btn" id="genBtn">
      <i class="ti ti-wand"></i> Write it for me
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="output-area" id="outputArea">
      <div class="divider"></div>
      <div class="card-label">Your message</div>
      <div class="output-box" id="outputBox"></div>
      <div class="output-actions">
        <button class="action-btn" id="copyBtn"><i class="ti ti-copy"></i> Copy</button>
        <button class="action-btn" id="regenBtn"><i class="ti ti-refresh"></i> Try again</button>
        <span class="copied-badge" id="copiedBadge">Copied</span>
      </div>
    </div>
  </div>

  <script>
    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    let isDark = localStorage.getItem('theme') ? localStorage.getItem('theme') === 'dark' : prefersDark;

    function applyTheme() {
      document.body.classList.toggle('dark', isDark);
      document.body.classList.toggle('light', !isDark);
      themeToggle.innerHTML = isDark ? '<i class="ti ti-sun"></i> Light' : '<i class="ti ti-moon"></i> Dark';
    }

    applyTheme();

    themeToggle.addEventListener('click', () => {
      isDark = !isDark;
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      applyTheme();
    });

    const ENDPOINTS = {
      anthropic: 'https://api.anthropic.com/v1/messages',
      openai:    'https://api.openai.com/v1/chat/completions',
      google:    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent',
      mistral:   'https://api.mistral.ai/v1/chat/completions',
      cohere:    'https://api.cohere.ai/v2/chat',
      xai:       'https://api.x.ai/v1/chat/completions',
    };
    const MODELS = { openai: 'gpt-4o', mistral: 'mistral-large-latest', xai: 'grok-3', cohere: 'command-r-plus' };
    const SYSTEM_PROMPT = `You are an expert at helping people communicate difficult messages. Write a single, ready-to-send message. No intro, no explanation, no "here's the message" — just the message itself. Make it feel human and natural, not AI-generated.`;

    let selectedSituation = 'saying no to someone';
    let selectedTone = 'warm and gentle';

    document.querySelectorAll('.sit-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sit-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedSituation = btn.dataset.val;
      });
    });

    document.querySelectorAll('.tone-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedTone = btn.dataset.val;
      });
    });

    // Load saved API key on page load
    const savedKey = localStorage.getItem('sifm_api_key');
    if (savedKey) {
      document.getElementById('apiKey').value = savedKey;
      document.getElementById('apiSection').classList.add('visible');
      document.getElementById('keyToggle').textContent = 'Hide API key';
    }

    // Save API key when user types
    document.getElementById('apiKey').addEventListener('input', (e) => {
      const val = e.target.value.trim();
      if (val) localStorage.setItem('sifm_api_key', val);
      else localStorage.removeItem('sifm_api_key');
    });

    document.getElementById('keyToggle').addEventListener('click', () => {
      const section = document.getElementById('apiSection');
      const toggle = document.getElementById('keyToggle');
      const visible = section.classList.toggle('visible');
      toggle.textContent = visible ? 'Hide API key' : 'Add your API key';
    });

    document.getElementById('genBtn').addEventListener('click', generate);
    document.getElementById('regenBtn').addEventListener('click', generate);

    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('outputBox').textContent).then(() => {
        const badge = document.getElementById('copiedBadge');
        badge.classList.add('visible');
        setTimeout(() => badge.classList.remove('visible'), 2000);
      });
    });

    async function generate() {
      const details  = document.getElementById('details').value.trim();
      const apiKey   = document.getElementById('apiKey').value.trim();
      const provider = document.getElementById('provider').value;
      const format   = document.getElementById('format').value;

      if (!details) { showError('Tell us a bit more about your situation first.'); return; }
      if (!apiKey) {
        showError('Please add your API key to use this app.');
        document.getElementById('apiSection').classList.add('visible');
        document.getElementById('keyToggle').textContent = 'Hide API key';
        return;
      }

      hideError();
      setLoading(true);
      document.getElementById('outputArea').classList.remove('visible');

      const prompt = `Situation: ${selectedSituation}\nDetails: ${details}\nTone: ${selectedTone}\nFormat: ${format}\n\nWrite this message now.`;

      try {
        const result = await callAPI(provider, apiKey, prompt);
        document.getElementById('outputBox').textContent = result;
        document.getElementById('outputArea').classList.add('visible');
      } catch (err) {
        showError('Something went wrong: ' + err.message);
      } finally {
        setLoading(false);
      }
    }

    async function callAPI(provider, apiKey, prompt) {
      if (provider === 'anthropic') {
        const res = await fetch(ENDPOINTS.anthropic, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({ model: 'claude-opus-4-5', max_tokens: 600, system: SYSTEM_PROMPT, messages: [{ role: 'user', content: prompt }] }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.content[0].text;
      }
      if (provider === 'google') {
        const res = await fetch(`${ENDPOINTS.google}?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + '\n\n' + prompt }] }] }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.candidates[0].content.parts[0].text;
      }
      if (provider === 'cohere') {
        const res = await fetch(ENDPOINTS.cohere, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({ model: MODELS.cohere, messages: [{ role: 'system', content: SYSTEM_PROMPT }, { role: 'user', content: prompt }] }),
        });
        const data = await res.json();
        if (data.message) throw new Error(data.message);
        return data.message?.content?.[0]?.text || data.text;
      }
      const res = await fetch(ENDPOINTS[provider], {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({ model: MODELS[provider], max_tokens: 600, messages: [{ role: 'system', content: SYSTEM_PROMPT }, { role: 'user', content: prompt }] }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.choices[0].message.content;
    }

    function setLoading(on) {
      const btn = document.getElementById('genBtn');
      btn.disabled = on;
      btn.innerHTML = on ? '<span class="loading-dots">Writing<span>.</span><span>.</span><span>.</span></span>' : '<i class="ti ti-wand"></i> Write it for me';
    }
    function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('visible'); }
    function hideError() { document.getElementById('errorMsg').classList.remove('visible'); }
  </script>
</body>
</html>
